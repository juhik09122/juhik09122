<!DOCTYPE html>
<html>
<head>
<style>
body {
  background-color: lightgray;
}

.container {
  width: 500px;
  height: 300px;
  background-color: lightgray;
  border: 1px solid gray;
  padding: 10px;
  margin: 20px auto;
}

button {
  background-color: #4CAF50; /* Green */
  border: none;
  color: white;
  padding: 10px 20px;
  text-align: center;
  text-decoration: none;
  display: inline-block;
  font-size: 16px;
  margin: 4px 2px;
  cursor: pointer;
  border-radius: 5px;
}
</style>
</head>
<body>

<div class="container">
  <h1>Welcome Admin</h1>
  <button>Home</button>
  <button>LogOut</button>
  <button>Maintain User</button>
  <button>Maintain Vendor</button>
</div>

</body>
</html>
